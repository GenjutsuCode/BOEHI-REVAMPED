name: Minify and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install minifier
        run: npm install -g minify

      - name: Minify JS
        run: |
          find . -name "*.js" -not -path "./.github/*" -not -path "./node_modules/*" | while read f; do
            minify "$f" > "$f.min" && mv "$f.min" "$f"
          done

      - name: Minify CSS
        run: |
          find . -name "*.css" -not -path "./.github/*" -not -path "./node_modules/*" | while read f; do
            minify "$f" > "$f.min" && mv "$f.min" "$f"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
